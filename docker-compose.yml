services:
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 2s
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: postgresql
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gtm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d gtm"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 2s
    restart: always

  gtm-ai:
    build:
      context: ./gtm-ai
      dockerfile: Dockerfile
    container_name: gtm-ai
    ports:
      - "4111:4111"
    environment:
      - REDIS_URL=redis://valkey:6379
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - CONTEXT_DEV_API_KEY=${CONTEXT_DEV_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - SCRAPFLY_API_KEY=${SCRAPFLY_API_KEY}
      - GTM_SCORE_MODEL=deepseek/deepseek-v4-flash
      - GTM_ANALYSIS_MODEL=deepseek/deepseek-v4-pro
      - GTM_SEARCH_TERM_MODEL=deepseek/deepseek-v4-flash
      - GTM_SEARCH_FILTER_MODEL=deepseek/deepseek-v4-pro
      - GTM_TWITTER_MODEL=openrouter/x-ai/grok-4.3
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4111/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: always

  gtm-workers-worker:
    build:
      context: ./gtm-workers
      dockerfile: Dockerfile
    container_name: gtm-workers-worker
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/gtm
      - REDIS_URL=redis://valkey:6379
      - GTM_AI_BASE_URL=http://gtm-ai:4111
      - DORG_API_TOKEN=${DORG_API_TOKEN}
      - SEARCH_DAYS_BACK=30
      - SEARCH_PAGES=2
      - SEARCH_WORKER_CONCURRENCY=2
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      gtm-ai:
        condition: service_healthy
    restart: always
    command: worker

